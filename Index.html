<!DOCTYPE html>
<html lang="es">
<head>


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#06152e;
}


.solar{
    position:relative;
    width:700px;
    height:700px;
}


.sol{
    position:absolute;
    top:50%;
    left:50%;
    width:90px;
    height:90px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, #ffd54a, #ff8c00);
    box-shadow:0 0 40px #ffae00;
}


.orbita{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border:1px solid rgba(255,255,255,0.45);
    border-radius:50%;
}


.rotar{
    position:absolute;
    width:100%;
    height:100%;
    animation-name:orbitar ;
}


.planeta{
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%);
    border-radius:50%;
}


.mercurio{
    width:140px;
    height:140px;
}
.mercurio .rotar{
    animation-duration:4s;
    animation-timing-function: linear;
    animation-iteration-count:infinite ;
}
.mercurio .planeta{
    width:12px;
    height:12px;
    background:#a9a9a9;
}


.venus{
    width:220px;
    height:220px;
}
.venus .rotar{
    animation-duration:7s;
    animation-timing-function: linear;
    animation-iteration-count:infinite ;
}
.venus .planeta{
    width:16px;
    height:16px;
    background:#d8b46a;
}


.tierra{
    width:320px;
    height:320px;
}
.tierra .rotar{
    animation-duration:10s;
    animation-timing-function: linear;
    animation-iteration-count:infinite ;
}
.tierra .planeta{
    width:18px;
    height:18px;
    background:#2ea8ff;
}


.marte{
    width:430px;
    height:430px;
}
.marte .rotar{
    animation-duration:15s;
    animation-timing-function: linear;
    animation-iteration-count:infinite ;
}
.marte .planeta{
    width:15px;
    height:15px;
    background:#d85b35;
}

@keyframes orbitar{
    0%{
        transform:rotate(0deg);
    }
    100%{
        transform:rotate(360deg);
    }
}
h2{color:white;
font-family: Arial, Helvetica, sans-serif;
text-align: center;}
</style>
</head>

<body>
    <h2> Sistema Solar  <br> 56_Rogel_Flores</h2>

<div class="solar">

    <div class="sol"></div>

    <div class="orbita mercurio">
        <div class="rotar">
            <div class="planeta"></div>
        </div>
    </div>

    <div class="orbita venus">
        <div class="rotar">
            <div class="planeta"></div>
        </div>
    </div>

    <div class="orbita tierra">
        <div class="rotar">
            <div class="planeta"></div>
        </div>
    </div>

    <div class="orbita marte">
        <div class="rotar">
            <div class="planeta"></div>
        </div>
    </div>

</div>

</body>
</html>
